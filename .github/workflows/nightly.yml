name: Nightly Pre-Release

# Publishes a Windows-only pre-release for every push to `main`. Version is
# derived deterministically from the commit's UTC timestamp and short SHA:
#
#     v0.0.0-YYYYMMDD.HHMMSS-<sha7>
#
# git-shim is Windows-only by design; only Windows targets are produced.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          ts="$(git show -s --format=%cd --date=format-local:%Y%m%d.%H%M%S "$GITHUB_SHA")"
          sha7="$(git rev-parse --short=7 "$GITHUB_SHA")"
          version="0.0.0-${ts}-${sha7}"
          tag="nightly-${ts}-${sha7}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
          echo "Computed version: ${version}"
          echo "Computed tag:     ${tag}"
        env:
          TZ: UTC

  gate:
    name: Pre-release quality gate
    needs: version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings
      - run: cargo test --all-targets --target x86_64-pc-windows-msvc --no-fail-fast

  build:
    name: Build ${{ matrix.target }}
    needs: [version, gate]
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-msvc
          - aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}-nightly

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          python - "$v" <<'PY'
          import re, sys, pathlib
          v = sys.argv[1]
          p = pathlib.Path("Cargo.toml")
          s = p.read_text()
          s = re.sub(r'^version = "[^"]+"', f'version = "{v}"', s, count=1, flags=re.M)
          p.write_text(s)
          PY

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          v="${{ needs.version.outputs.version }}"
          name="git-shim-v${v}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/git-shim.exe" "dist/${name}/git-shim.exe"
          cp README.md LICENSE AGENTS.md "dist/${name}/"
          cd dist
          powershell -NoProfile -Command "Compress-Archive -Path '${name}' -DestinationPath '${name}.zip'"
          echo "asset=dist/${name}.zip" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-shim-${{ matrix.target }}
          path: ${{ steps.pkg.outputs.asset }}
          if-no-files-found: error

  publish:
    name: Publish pre-release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Create / update pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "Nightly ${{ needs.version.outputs.version }}"
          prerelease: true
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
          files: dist/*
          body: |
            Automated pre-release built from `${{ github.sha }}`.

            **Version:** `${{ needs.version.outputs.version }}`

            Windows-only artifacts. See README.md for installation.

            > These builds are not guaranteed to be stable. Use tagged
            > releases for production deployments.
