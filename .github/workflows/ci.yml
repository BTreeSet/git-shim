name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# git-shim is Windows-only by design (it resolves the `git.exe` bundled
# inside GitHub Desktop under %LOCALAPPDATA%). All CI runs on Windows.

jobs:
  lint:
    name: Lint (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --all-targets --target x86_64-pc-windows-msvc

  test:
    name: Test (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-windows
      - name: cargo test
        run: cargo test --all-targets --target x86_64-pc-windows-msvc --no-fail-fast
