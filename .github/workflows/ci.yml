name: CI

on:
  push:
    branches: [main]
  pull_request:

# Top-level: deny-by-default. Every job below re-declares the exact
# scopes it needs. This zeroes out every implicit scope (most
# importantly `packages: write`, which older repos default to granting)
# regardless of repo-level Actions settings.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# git-shim is Windows-only by design (it resolves the `git.exe` bundled
# inside GitHub Desktop under %LOCALAPPDATA%). All CI runs on Windows.

jobs:
  lint:
    name: Lint (windows-latest)
    runs-on: windows-latest
    # Read-only access to the repo source. No write scopes whatsoever.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # Don't leave the GITHUB_TOKEN in `.git/config` after checkout;
          # nothing in this job pushes.
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --target x86_64-pc-windows-msvc -- -D warnings

  msrv:
    name: MSRV (1.85)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@1.85.0
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --all-targets --target x86_64-pc-windows-msvc

  test:
    name: Test (windows-latest)
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          key: test-windows
      - name: cargo test
        run: cargo test --all-targets --target x86_64-pc-windows-msvc --no-fail-fast

  e2e:
    name: E2E (real GitHub Desktop install)
    runs-on: windows-latest
    needs: [lint, test]
    # This job executes an *external* installer (GitHub Desktop) under
    # the runner account. Even though the installer is downloaded from
    # the upstream vendor over HTTPS, defense-in-depth dictates that:
    #   1. No write scopes are granted (`contents: read` only).
    #   2. The checkout step is told not to persist the token into
    #      `.git/config` (`persist-credentials: false`), so a compromised
    #      installer cannot pivot from the checkout cwd to a token grab.
    #   3. `GITHUB_TOKEN` is never explicitly placed into any step's
    #      `env:` block in this job. The only way a child process could
    #      see it is via the credentials helper, which (1) and (2)
    #      together neutralize.
    permissions:
      contents: read
    env:
      GHD_INSTALL_VERSION: '3.5.12'
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-windows

      # Cache the installer (~150 MB) keyed by pinned version so we don't
      # redownload it on every run.
      - name: Cache GitHub Desktop installer
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/GitHubDesktopSetup-x64-${{ env.GHD_INSTALL_VERSION }}.exe
          key: ghd-installer-${{ env.GHD_INSTALL_VERSION }}

      - name: Install GitHub Desktop ${{ env.GHD_INSTALL_VERSION }}
        shell: pwsh
        run: ./scripts/install-github-desktop.ps1 -Version $env:GHD_INSTALL_VERSION

      - name: Show system git for contrast
        shell: pwsh
        run: |
          $sys = Get-Command git.exe -ErrorAction SilentlyContinue
          if ($sys) {
            Write-Host "System git on PATH: $($sys.Source)"
            & $sys.Source --version
          } else {
            Write-Host "No system git on PATH"
          }

      - name: Run e2e verification
        shell: pwsh
        run: |
          ./scripts/e2e.ps1 `
            -Target x86_64-pc-windows-msvc `
            -ExpectedGhdVersion $env:GHD_INSTALL_VERSION
